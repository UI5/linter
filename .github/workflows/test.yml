name: Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# No permissions are required for this workflow
permissions: {}

jobs:
  test:
    name: Unit and Integration
    strategy:
      fail-fast: false # Do not stop other jobs if one fails
      matrix:
        version: ["20.11.0", 22, 24]
        os: [ubuntu-24.04, windows-2025, macos-15]
    runs-on: ${{ matrix.os }}
    steps:

    - uses: actions/checkout@v7

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: ${{ matrix.version }}

    - name: Install dependencies
      run: npm ci

    - name: Run unit tests
      run: npm run unit

  # Aggregator so branch protection can require a single "Tests" check
  # instead of every matrix combination.
  tests:
    name: Tests
    needs: test
    if: always()
    runs-on: ubuntu-24.04
    steps:
    - name: Check matrix result
      run: |
        if [ "${{ needs.test.result }}" != "success" ]; then
          echo "Test matrix result: ${{ needs.test.result }}"
          exit 1
        fi
